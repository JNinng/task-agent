app:
  name: template-app
  env: dev
  watch: true

log:
  level: info
  format: console
  path: logs/app.log
  max_size: 200
  max_age: 60
  max_backups: 60
  compress: true
  log_to_console: true

nacos:
  addr: 127.0.0.1
  port: 8848
  namespace: public
  group: DEFAULT_GROUP
  data_id: template-app.yml
  log_level: debug
  log_dir: logs
  cache_dir: cache

observability:
  enabled: false
  addr: ":9090"
  metrics_path: /metrics
  health_path: /health
  tracing:
    enabled: false
    endpoint: ""

secret:
  key: ""
